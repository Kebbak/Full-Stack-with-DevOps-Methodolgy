---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cpu-memory
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cpu-memory-dashboard.json: |
    {
      "id": null,
      "title": "K8s CPU & Memory Usage",
      "tags": ["kubernetes", "prometheus", "cpu", "memory"],
      "timezone": "browser",
      "schemaVersion": 16,
      "version": 1,
      "refresh": "5s",
      "panels": [
        {
          "type": "graph",
          "title": "CPU Usage (cores)",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{image!=""}[5m])) by (pod)",
              "format": "time_series",
              "intervalFactor": 2,
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "datasource": "Prometheus",
          "id": 1
        },
        {
          "type": "graph",
          "title": "Memory Usage (MiB)",
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{image!=""}) by (pod) / 1024 / 1024",
              "format": "time_series",
              "intervalFactor": 2,
              "legendFormat": "{{pod}}",
              "refId": "B"
            }
          ],
          "datasource": "Prometheus",
          "id": 2
        }
      ]
    }
