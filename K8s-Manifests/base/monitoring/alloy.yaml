---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      containers:
      - name: alloy
        image: grafana/alloy:latest
        ports:
        - containerPort: 12345
        volumeMounts:
        - name: alloy-config
          mountPath: /etc/alloy/
      volumes:
      - name: alloy-config
        configMap:
          name: alloy-config
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 12345
      targetPort: 12345
  selector:
    app: alloy